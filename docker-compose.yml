services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: auribot
      POSTGRES_USER: auribot
      POSTGRES_PASSWORD: auribot
    ports:
      - "5432:5432"
    volumes:
      - auribot-postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "development"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/auribot"
      SPRING_DATASOURCE_USERNAME: "auribot"
      SPRING_DATASOURCE_PASSWORD: "auribot"
      AURIBOT_CORS_ALLOWED_ORIGINS: "*"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  auribot-postgres:

networks:
  default:
    name: auribot-modern
