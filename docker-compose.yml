services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: auribot
      POSTGRES_USER: auribot
      POSTGRES_PASSWORD: auribot
    ports:
      - "5432:5432"
    volumes:
      - auribot-postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "development"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/auribot"
      SPRING_DATASOURCE_USERNAME: "auribot"
      SPRING_DATASOURCE_PASSWORD: "auribot"
      AURIBOT_CORS_ALLOWED_ORIGINS: "*"

  # Production-like frontend (nginx serving built assets)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8081:80" # keep available, but don't occupy :80 when using frontend-dev

  # Dev frontend with Hot Module Reload (no rebuild needed)
  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_BASE: "http://localhost:8080"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - auribot-frontend-node_modules:/app/node_modules
    command: sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "80:5173" # serve Vite dev server on port 80

volumes:
  auribot-postgres:
  auribot-frontend-node_modules:

networks:
  default:
    name: auribot-modern
