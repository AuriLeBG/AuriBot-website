# Development profile (used by docker-compose)

# Database (Postgres)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/auribot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:auribot}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:auribot}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Allow the old frontend behavior (open CORS). Tighten later.
auribot.cors.allowed-origins=${AURIBOT_CORS_ALLOWED_ORIGINS:*}
